name: Build interview slides

on:
  push:
    branches: [main]
    paths:
      - "docs/presentation_en.tex"
      - "docs/presentation_pt.tex"
      - "docs/or_surgery_scheduling_beamer.tex"
      - "docs/img/**"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile English presentation
        uses: xu-cheng/latex-action@v3
        with:
          root_file: presentation_en.tex
          working_directory: docs

      - name: Compile Portuguese presentation
        uses: xu-cheng/latex-action@v3
        with:
          root_file: presentation_pt.tex
          working_directory: docs

      - name: Compile original beamer (legacy)
        uses: xu-cheng/latex-action@v3
        with:
          root_file: or_surgery_scheduling_beamer.tex
          working_directory: docs

      - name: Upload PDFs as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: interview-slides
          path: |
            docs/presentation_en.pdf
            docs/presentation_pt.pdf
            docs/or_surgery_scheduling_beamer.pdf

      - name: Commit compiled PDFs back to the repo
        if: github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/presentation_en.pdf docs/presentation_pt.pdf docs/or_surgery_scheduling_beamer.pdf
          git diff --staged --quiet || git commit -m "Auto-build interview slides PDFs [skip ci]"
          git push
